<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Store | جود ستور</title>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00f2ff;
            --secondary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --whatsapp-green: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Changa', sans-serif; }
        body { background-color: var(--secondary-bg); color: var(--text-main); line-height: 1.6; }

        nav {
            background: rgba(15, 23, 42, 0.9); padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0, 242, 255, 0.1);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }
        .logo { font-size: 1.8rem; font-weight: 700; cursor: pointer; color: var(--primary-glow); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links li a { text-decoration: none; color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-links li a:hover { color: var(--primary-glow); text-shadow: 0 0 8px var(--primary-glow); }

        .page { display: none; min-height: 80vh; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #home-page {
            height: 85vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; color: white;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
        #home-page h1 { font-size: 3.5rem; margin-bottom: 20px; color: var(--primary-glow); }
        
        .btn-browse { 
            background: transparent; color: var(--primary-glow); padding: 12px 35px; 
            border-radius: 30px; border: 2px solid var(--primary-glow); font-size: 1.1rem; 
            cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.4s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .btn-browse:hover { background: var(--primary-glow); color: var(--secondary-bg); box-shadow: 0 0 30px var(--primary-glow); }

        .container { padding: 50px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.1); transition: 0.4s; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary-glow); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15); }
        .card img { width: 100%; height: 180px; object-fit: cover; margin-bottom: 15px; border-radius: 12px; }
        .card h3 { margin-bottom: 10px; color: var(--text-main); }
        .price { color: var(--primary-glow); font-weight: 700; font-size: 1.4rem; text-shadow: 0 0 5px rgba(0, 242, 255, 0.3); }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 900px; border-radius: 25px;
            display: flex; position: relative; overflow: hidden; max-height: 90vh;
            border: 1px solid var(--primary-glow);
        }
        .close-modal { position: absolute; top: 20px; left: 20px; font-size: 35px; cursor: pointer; z-index: 10; color: var(--accent-color); }
        
        /* تعديل صور المودال لإزالة السواد */
        .modal-images { width: 45%; background: var(--secondary-bg); padding: 20px; display: flex; align-items: center; justify-content: center; }
        .modal-images img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; }
        
        .modal-info { width: 55%; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        
        .whatsapp-btn {
            background: var(--whatsapp-green); color: white; padding: 15px; border: none;
            border-radius: 12px; font-weight: 700; margin-top: 20px; cursor: pointer;
            text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--whatsapp-green); }

        .section-title { text-align:center; margin-bottom:50px; font-size: 2.5rem; color: var(--primary-glow); text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-images, .modal-info { width: 100%; }
            .nav-links { gap: 15px; font-size: 0.9rem; }
        }
    </style>
</head>

        function displayProducts() {
            const laptopGrid = document.getElementById('laptops-grid');
            laptopGrid.innerHTML = laptops.map(p => createCard(p, 'laptops')).join('');
            const phoneGrid = document.getElementById('phones-grid');
            phoneGrid.innerHTML = phones.map(p => createCard(p, 'phones')).join('');
        }

        function createCard(p, type) {
            return `
                <div class="card" onclick="openProduct(${p.id}, '${type}')">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">${p.price}</p>
                </div>
            `;
        }

        function openProduct(id, type) {
            const list = (type === 'phones') ? phones : laptops;
            const p = list.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalCat').innerText = p.cat;
            document.getElementById('modalDesc').innerHTML = p.desc;
            document.getElementById('modalPrice').innerText = p.price;
            document.getElementById('modalImg').src = p.img;
            const message = `مرحباً جود ستور، أود الاستفسار عن ${p.name}`;
            document.getElementById('whatsappLink').href = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent(message)}`;
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }
